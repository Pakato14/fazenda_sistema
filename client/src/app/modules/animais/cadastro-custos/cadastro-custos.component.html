<div class="card p-3">
  <h5>Cadastro tipo de Criação</h5>

  <form #formCadastroCustos="ngForm">

    <div class="mb-3">
      <label>Tipo</label>
      <input #nome="ngModel" [(ngModel)]="custo.nome" name="nome" class="form-control">
    </div>

    <button class="btn btn-success" (click)="salvar()">Salvar</button>
  </form>
</div>
