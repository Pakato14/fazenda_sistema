<div class="card p-3">
  <h5>Cadastro tipo de Ração <span *ngIf="editando" class="text-warning">(Editando)</span></h5>

  <form #formCadastroRacao="ngForm">

    <div class="mb-3">
      <label>Tipo</label>
      <input #tipo_racao="ngModel" [(ngModel)]="racao.tipo_racao" name="tipo_racao" class="form-control">
    </div>

    <div class="mb-3">
      <label>Custo por Kg</label>
      <input type="number" #custo_por_kg="ngModel" [(ngModel)]="racao.custo_por_kg" name="custo_por_kg" class="form-control">
    </div>

    <button type="button" class="btn btn-success me-2" (click)="salvar()">
      {{ editando ? 'Atualizar' : 'Salvar' }}
    </button>

    <button *ngIf="editando" type="button" class="btn btn-secondary" (click)="cancelarEdicao()">
      Cancelar
    </button>
  </form>
</div>

<!-- LISTAGEM -->
<div class="card p-3 mt-3">

  <h5>Tipo de Ração cadastradas</h5>

  <!-- 🔍 FILTRO -->
  <div class="mb-3">
    <input
      type="text"
      class="form-control"
      placeholder="Pesquisar nome..."
      [(ngModel)]="termoBusca">
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th class="text-center fw-bold">#</th>
        <th class="text-center">Tipo de Ração</th>
        <th class="text-center">Custo por Kg</th>
        <th class="text-center">Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of listaPaginada; let i = index">
        <td class="text-center fw-bold">{{ i + 1 }}</td>
        <td class="text-center">{{ item.tipo_racao }}</td>
        <td class="text-center">{{ item.custo_por_kg }}</td>
        <td class="text-center">
          <button class="btn btn-primary btn-sm me-2" (click)="editar(item)">
            Editar
          </button>

          <button class="btn btn-danger btn-sm" (click)="excluir(item.id)">
            Excluir
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- 📄 PAGINAÇÃO -->
  <nav *ngIf="totalPaginas > 1">
    <ul class="pagination">

      <li class="page-item" [class.disabled]="paginaAtual === 1">
        <button class="page-link" (click)="mudarPagina(paginaAtual - 1)">
          Anterior
        </button>
      </li>

      <li
        class="page-item"
        *ngFor="let p of [].constructor(totalPaginas); let i = index"
        [class.active]="paginaAtual === i + 1">

        <button class="page-link" (click)="mudarPagina(i + 1)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="paginaAtual === totalPaginas">
        <button class="page-link" (click)="mudarPagina(paginaAtual + 1)">
          Próxima
        </button>
      </li>

    </ul>
  </nav>
</div>
