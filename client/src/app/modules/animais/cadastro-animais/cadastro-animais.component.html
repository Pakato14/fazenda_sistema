<div class="card p-3">
  <h5>
    Cadastro tipo de Criação
    <span *ngIf="editando" class="text-warning">(Editando)</span>
  </h5>

  <form #formCadastroAnimal="ngForm">

    <div class="mb-3">
      <label>Tipo</label>
      <input
        [(ngModel)]="animal.tipo"
        name="tipo"
        class="form-control"
        required>
    </div>

    <button type="button" class="btn btn-success me-2" (click)="salvar()">
      {{ editando ? 'Atualizar' : 'Salvar' }}
    </button>

    <button *ngIf="editando" type="button" class="btn btn-secondary" (click)="cancelarEdicao()">
      Cancelar
    </button>
  </form>
</div>

<!-- LISTAGEM -->
<div class="card p-3 mt-3">

  <h5>Animais cadastrados</h5>

  <!-- 🔍 FILTRO -->
  <div class="mb-3">
    <input
      type="text"
      class="form-control"
      placeholder="Pesquisar tipo..."
      [(ngModel)]="termoBusca">
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th class="text-center fw-bold">ID</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of listaPaginada; let i = index">
        <td class="text-center fw-bold">{{ i + 1 }}</td>
        <td>{{ item.tipo }}</td>
        <td>
          <button class="btn btn-primary btn-sm me-2" (click)="editar(item)">
            Editar
          </button>

          <button class="btn btn-danger btn-sm" (click)="excluir(item.id)">
            Excluir
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- 📄 PAGINAÇÃO -->
  <nav *ngIf="totalPaginas > 1">
    <ul class="pagination">

      <li class="page-item" [class.disabled]="paginaAtual === 1">
        <button class="page-link" (click)="mudarPagina(paginaAtual - 1)">
          Anterior
        </button>
      </li>

      <li
        class="page-item"
        *ngFor="let p of [].constructor(totalPaginas); let i = index"
        [class.active]="paginaAtual === i + 1">

        <button class="page-link" (click)="mudarPagina(i + 1)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="paginaAtual === totalPaginas">
        <button class="page-link" (click)="mudarPagina(paginaAtual + 1)">
          Próxima
        </button>
      </li>

    </ul>
  </nav>
</div>
