<p>empresas works!</p>
<div class="card p-3">
  <div class="d-flex justify-content-between mb-3">
    <h5>Empresas</h5>
    <button class="btn btn-primary" routerLink="/newcompany">
      Nova
    </button>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nome</th>
        <th>CNPJ</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let u of empresas">
        <td>{{ u.nome }}</td>
        <td>{{ u.cnpj }}</td>
        <td>
          <button class="btn btn-sm btn-warning">Editar</button>
          <button class="btn btn-sm btn-danger">Excluir</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
